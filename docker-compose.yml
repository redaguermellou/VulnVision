# ════════════════════════════════════════════════════════════
# VulnVision – Docker Compose
# Services: web (Django/Gunicorn), nginx, postgres, redis, celery
# ════════════════════════════════════════════════════════════

version: "3.9"

# ── Shared build context ──────────────────────────────────────
x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  env_file: .env
  volumes:
    - static_files:/app/staticfiles
    - media_files:/app/media
    - app_logs:/app/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - vulnvision_net
  restart: unless-stopped

# ─────────────────────────────────────────────────────────────
services:

  # ── Django + Gunicorn ────────────────────────────────────────
  web:
    <<: *app-common
    container_name: vulnvision_web
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.vulnvision.role=web"

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vulnvision_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    networks:
      - vulnvision_net
    restart: unless-stopped
    labels:
      - "com.vulnvision.role=nginx"

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vulnvision_postgres
    environment:
      POSTGRES_DB:       "${DB_NAME:-vulnvision}"
      POSTGRES_USER:     "${DB_USER:-vulnvision}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"      # Comment out in prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vulnvision} -d ${DB_NAME:-vulnvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulnvision_net
    restart: unless-stopped

  # ── Redis (broker + cache + result backend) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: vulnvision_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"   # Comment out in prod
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulnvision_net
    restart: unless-stopped

  # ── Celery worker ────────────────────────────────────────────
  celery_worker:
    <<: *app-common
    container_name: vulnvision_celery_worker
    command:
      - celery
      - -A
      - vulnvision
      - worker
      - --loglevel=info
      - --concurrency=4
      - --queues=default,scans,reports
      - --logfile=/app/logs/celery-worker.log
    healthcheck:
      test: ["CMD-SHELL", "celery -A vulnvision inspect ping -d celery@$$HOSTNAME --timeout 5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    labels:
      - "com.vulnvision.role=celery-worker"

  # ── Celery Beat (scheduler) ──────────────────────────────────
  celery_beat:
    <<: *app-common
    container_name: vulnvision_celery_beat
    command:
      - celery
      - -A
      - vulnvision
      - beat
      - --loglevel=info
      - --scheduler=django_celery_beat.schedulers:DatabaseScheduler
      - --logfile=/app/logs/celery-beat.log
    labels:
      - "com.vulnvision.role=celery-beat"

  # ── Celery Flower (monitoring UI – optional) ─────────────────
  flower:
    <<: *app-common
    container_name: vulnvision_flower
    command:
      - celery
      - -A
      - vulnvision
      - flower
      - --port=5555
      - --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    labels:
      - "com.vulnvision.role=flower"

# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local
  nginx_certs:
    driver: local

networks:
  vulnvision_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
