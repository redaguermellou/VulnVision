{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Login - VulnVision{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 fw-bold">Login</h3>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2">Sign In</button>
                    </div>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted small">Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none">Register here</a></p>
                    <p class="small"><a href="{% url 'password_reset' %}" class="text-muted text-decoration-none">Forgot password?</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
