{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Change Password - VulnVision{% endblock %}

{% block extra_css %}
<style>
.auth-card {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    position: relative;
    overflow: hidden;
}
.auth-card::before {
    content: '';
    position: absolute;
    top: -50px; left: -50px;
    width: 200px; height: 200px;
    background: rgba(239, 68, 68, 0.15); /* red for danger/security */
    filter: blur(60px);
    z-index: 0;
}
.form-control {
    background: rgba(0, 0, 0, 0.4) !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;
    color: #fff !important;
    transition: all 0.3s ease;
    padding: 0.8rem 1.2rem;
    border-radius: 12px;
}
.form-control:focus {
    border-color: rgba(239, 68, 68, 0.5) !important;
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2) !important;
    background: rgba(15, 23, 42, 0.8) !important;
}
label {
    color: #94a3b8 !important;
    font-weight: 500;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
}
.form-text {
    color: #64748b !important;
}
</style>
{% endblock %}

{% block content %}
<div class="row w-100 justify-content-center align-items-center" style="min-height: calc(100vh - 200px);">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card">
            <div class="p-5 position-relative" style="z-index: 1;">
                <div class="text-center mb-5">
                    <div class="d-inline-block position-relative mb-4">
                        <div class="position-absolute top-50 start-50 translate-middle" style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.3); filter: blur(20px); border-radius: 50%;"></div>
                        <i class="fas fa-key fa-4x text-danger position-relative" style="text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);"></i>
                    </div>
                    <h3 class="fw-bold text-white mb-2">Update Credentials</h3>
                    <p class="text-white-50 small tracking-widest text-uppercase">Maintain Account Security</p>
                </div>
                
                <hr class="border-secondary opacity-25 mb-4">
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="d-flex flex-column gap-3 mt-5">
                        <button type="submit" class="btn text-uppercase tracking-widest small fw-bold py-3 shadow-lg" style="background: rgba(239, 68, 68, 0.8); border: 1px solid #ef4444; color: white; border-radius: 12px; transition: all 0.3s;">
                            <i class="fas fa-lock me-2"></i>Execute Password Change
                        </button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary text-uppercase tracking-widest small fw-bold py-3" style="border-radius: 12px;">
                            Abort & Return
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
