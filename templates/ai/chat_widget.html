<div id="ai-chat-widget" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050; width: 400px; max-width: 90vw;">
    <div id="chat-widget-window" class="card bg-dark border-primary shadow-lg d-none" style="height: 500px; display: flex; flex-direction: column;">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="fas fa-robot me-2"></i>Security Assistant</h6>
            <button type="button" class="btn-close btn-close-white" id="close-chat-widget"></button>
        </div>
        <div class="card-body bg-dark overflow-auto flex-grow-1" id="widget-messages" style="height: 0;">
             <!-- Messages will appear here -->
             <div class="message-container assistant mb-2">
                <div class="bg-secondary text-white p-2 rounded small" style="max-width: 90%;">
                    Need help analyzing <strong>{{ target.name|default:"the results" }}</strong>?
                </div>
            </div>
        </div>
        <div class="card-footer bg-dark border-secondary p-2">
            <form id="widget-form">
                <div class="input-group input-group-sm">
                    <input type="text" id="widget-input" class="form-control bg-dark text-white border-secondary" placeholder="Ask anything...">
                    <button class="btn btn-primary" type="submit"><i class="fas fa-paper-plane"></i></button>
                </div>
            </form>
        </div>
    </div>
    
    <button id="toggle-chat-widget" class="btn btn-primary rounded-circle shadow-lg float-end" style="width: 60px; height: 60px;">
        <i class="fas fa-comment-dots fa-2x"></i>
    </button>
</div>

<style>
    #widget-messages::-webkit-scrollbar { width: 4px; }
    #widget-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    
    .widget-message-user { background-color: #0d6efd !important; margin-left: auto; max-width: 90%; }
    .widget-message-assistant { background-color: #6c757d !important; max-width: 90%; }
</style>

<script>
(function() {
    const toggleBtn = document.getElementById('toggle-chat-widget');
    const closeBtn = document.getElementById('close-chat-widget');
    const chatWindow = document.getElementById('chat-widget-window');
    const widgetForm = document.getElementById('widget-form');
    const widgetInput = document.getElementById('widget-input');
    const widgetMessages = document.getElementById('widget-messages');
    const sessionId = "{{ session.id }}";

    toggleBtn.addEventListener('click', () => {
        chatWindow.classList.toggle('d-none');
        toggleBtn.classList.toggle('d-none');
    });

    closeBtn.addEventListener('click', () => {
        chatWindow.classList.add('d-none');
        toggleBtn.classList.remove('d-none');
    });

    widgetForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const content = widgetInput.value.trim();
        if (!content) return;

        appendWidgetMessage('user', content);
        widgetInput.value = '';
        
        fetch("{% url 'ai_assistant:send_message' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                content: content,
                session_id: sessionId
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                appendWidgetMessage('assistant', "Error: " + data.error);
            } else {
                appendWidgetMessage('assistant', data.raw_content);
            }
        });
    });

    function appendWidgetMessage(role, content) {
        const div = document.createElement('div');
        div.className = `p-2 rounded small mb-2 text-white widget-message-${role}`;
        div.textContent = content;
        widgetMessages.appendChild(div);
        widgetMessages.scrollTop = widgetMessages.scrollHeight;
    }
})();
</script>
