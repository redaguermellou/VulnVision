# ════════════════════════════════════════════════════════════
# VulnVision – Nginx site config (HTTP → HTTPS redirect + app)
# Replace <your-domain> with your actual domain.
# For local dev comment out the HTTPS server block entirely.
# ════════════════════════════════════════════════════════════

# ── HTTP: redirect everything to HTTPS ───────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main application ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;   # Replace with your domain in production

    # ── TLS (self-signed for dev, Let's Encrypt in prod) ─────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # HSTS (enable only once HTTPS is confirmed working)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static files ──────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media files ───────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Flower monitoring ──────────────────────────────────────
    location /flower/ {
        proxy_pass         http://flower:5555;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Restrict to internal networks
        allow 127.0.0.1;
        allow 172.20.0.0/24;
        deny  all;
    }

    # ── API rate limiting ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn 10;
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Auth endpoints: extra strict rate limiting ─────────────
    location ~ ^/(login|accounts/login|api/v1/auth/token/) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other requests ────────────────────────────────────
    location / {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Custom error pages ────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
